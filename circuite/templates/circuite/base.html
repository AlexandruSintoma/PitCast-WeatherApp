<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitCast - Vremea la circuitele F1 2026</title>

    <!-- iau bootstrap de pe internet, prin cdn, ca la lectie -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- niste culori ca sa arate a formula 1, negru cu rosu -->
    <style>
        body {
            background-color: #0f0f0f;
            color: #f2f2f2;
        }
        .navbar {
            background-color: #15151e;
            border-bottom: 3px solid #e10600;
        }
        .navbar a {
            color: #f2f2f2;
        }
        .titlu-mare {
            color: #e10600;
            font-weight: bold;
        }
        .card {
            background-color: #1c1c25;
            color: #f2f2f2;
            border: 1px solid #2a2a35;
        }
        /* fac toate pozele de pe carduri la fel de inalte ca sa arate ordonat */
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .buton-rosu {
            background-color: #e10600;
            color: white;
            border: none;
        }
        .buton-rosu:hover {
            background-color: #b30500;
            color: white;
        }
        .card-vreme {
            background-color: #15151e;
            border: 1px solid #e10600;
        }
        footer {
            border-top: 3px solid #e10600;
            color: #999;
        }
    </style>
</head>
<body>

    <!-- meniul de sus care apare pe toate paginile -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand titlu-mare" href="{% url 'acasa' %}">PitCast</a>
            <div>
                <a class="btn" href="{% url 'acasa' %}">Acasa</a>
                <a class="btn" href="{% url 'curse' %}">Curse 2026</a>
                <a class="btn buton-rosu" href="{% url 'adauga_circuit' %}">Adauga circuit</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        {% block continut %}
        {% endblock %}
    </div>

    <footer class="text-center py-4 mt-5">
        <p>PitCast - proiect final curs Python 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
